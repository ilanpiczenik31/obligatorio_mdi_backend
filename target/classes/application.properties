# Configuración de servidor
server.port=8000

# Configuración de OpenAPI/Swagger
springdoc.api-docs.path=/openapi.json
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method

# Información de la API
springdoc.info.title=API de Gestión de Productos
springdoc.info.description=API REST para gestión de productos, traducida de FastAPI a Spring Boot
springdoc.info.version=1.0.0

# Configuración de logging
logging.level.com.ejemplo.productos=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Configuración de validación
spring.validation.enabled=true 